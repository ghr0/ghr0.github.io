<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About - GHR's Nav</title>
    <!--引入字体，全局字体使用-->
    <link rel="stylesheet" href="https://npm.elemecdn.com/lxgw-wenkai-webfont@1.6.0/lxgwwenkai-bold.css" />
    <link rel="icon" href="file:///storage/emulated/0/Download/about.png" type="image/png">
    <!-- 引入Font Awesome图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style type="text/css">
    *{font-family:LXGW WenKai}
    *{font-weight:bold}
    body {font-family: LXGW WenKai;}
    </style>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }
		
		a:link {color: #000}
		a:visited {color: #000}

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            animation: fadeIn 0.7s ease-in-out;
        }

        .card {
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin: 20px 0;
            width: 100%;
            max-width: 600px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {            
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }

        .card img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            margin: 20px auto;
            border: 2px solid #a0a0a0;
            cursor: pointer;
            transition: transform 0.5s ease;
        }

        .card h2 {
            text-align: center;
            font-size: 1.35em;
            margin: 10px 0;
            color: #363636;
        }

        .card p {
            padding: 0 20px 20px 20px;
            color: #666666;
            font-size: 1.02em;
            line-height: 1.6;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .social-icons a {
            color: #363636;
            font-size: 24px;
            transition: transform 0.3s ease, color 0.3s ease;
        }

        .social-icons a:hover {
            color: #000;
            transform: scale(1.2); /* 图标放大 */
        }

        /* 头像旋转动画 */
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(-15deg); }
            50% { transform: rotate(15deg); }
            75% { transform: rotate(-10deg); }
            100% { transform: rotate(0deg); }
        }

        .rotate {
            animation: rotate 0.8s ease-in-out;
        }

        @media (max-width: 600px) {
            .card {
                max-width: 100%;
            }
          
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

            .card img {
                width: 100px;
                height: 100px;
            }
   
   
            a:link {
			color: #000;
		    }
		
	    	a:visited {
			color: #000;
		    }
		
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 关于我卡片 -->
        <div class="card">
            <img id="avatar" src="transparent.png" alt="Avatar" onclick="rotateAvatar()">
            <h2>个人介绍</h2>
            <p>
               你好！我是GHR，一名菜鸟前端开发者，坐标上海。
我热爱编程，喜欢听音乐、绘画。
我希望经过不断学习，我的技术会更加精湛。
            </p>
        </div>

        <!-- 关于本站卡片 -->
        <div class="card">
            <h2><br>关于本站</h2>
            <p>
                GHR's Nav致力于提供一个简单干净的浏览器起始页，并收藏一些好玩&实用的网站、提供一些站内工具，让大家上网冲浪时快人一步！
            </p>
            <div class="social-icons">
                <a href="https://twitter.com" target="_blank"><i class="fab fa-twitter"></i></a>
                <a href="https://weixin.com" target="_blank"><i class="fab fa-weixin"></i></a>
                <a href="https://github.com" target="_blank"><i class="fab fa-github"></i></a>
            </div>
        </div>
    </div>

    <script>
        function rotateAvatar() {
            const avatar = document.getElementById('avatar');
            avatar.classList.add('rotate');
            setTimeout(() => {
                avatar.classList.remove('rotate');
            }, 800); // 动画持续时间与CSS中的动画时间一致
        }
    </script>
</body>
</html>
